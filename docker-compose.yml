services:
  web:
    build: .
    ports:
      - "3000:3000"
    command: sh -c "HOST=0.0.0.0 npm run build && HOST=0.0.0.0 npm run start"
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
      - mockoon
      - rag-chat

  db:
    image: mysql:8
    # FIX: Prepend mysqld so the database server actually starts
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: mySQL123
      MYSQL_DATABASE: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mockoon:
    image: mockoon/cli
    env_file:
      - .env.docker
    # Change 'mockoon.json' to whatever your actual local filename is inside the folder
    command: -d /data/mockoon.json --port 4000 
    volumes:
      - ./mockoon:/data
    ports:
      - "4000:4000"
  rag-chat:
    build:
      context: ../TechMartRag # <-- Step out of techmart and look into techmart-rag
      dockerfile: Dockerfile   # <-- Uses the optimized multi-stage Dockerfile you provided
    container_name: techmart-chat-v2
    ports:
      - "3001:3001"
    env_file:
      - .env.docker # Passes your database configuration and API keys down to the Python app
    depends_on:
      - db
    volumes:
      - ../TechMartRag:/app
    command: uvicorn main:app --host 0.0.0.0 --port 3001

volumes:
  mysql_data: